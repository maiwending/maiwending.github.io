bio: |
  Wending Mai (Senior Member, IEEE) received the B.S. degree in electronic 
  information science and technology, the M.S. degree in radio physics, and 
  the Ph.D. degree in electromagnetic and microwave technology from the 
  University of Electronic Science and Technology of China, Chengdu, China, 
  in 2007, 2010, and 2019, respectively.,In 2009, he was a Student Researcher 
  with the Lenovo Research Institute, Chengdu. Then, he became an Engineer 
  with Texas Instrument, Shanghai and Dallas. From 2013 to 2015, he was an 
  Assistant Professor with Xichang University. In 2017, he joined the 
  Computational Electromagnetics and Antennas Research Laboratory, Department 
  of Electrical Engineering, The Pennsylvania State University, as a Visting 
  Scholar, and then a Postdoctoral Scholar, under the supervision of 
  Prof. Douglas H. Werner. From 2022 to 2026, he was a Senior Research and 
  Development Engineer with Ansys, Pittsburg, USA. He has published over 30 
  technical articles and proceeding articles. He served as a reviewer for over 
  ten journals and NSF grants. His current research interests include computational 
  electromagnetics (hp-adaptive technique, DGTD, and nonlinear and dispersive materials), 
  knot, and time-varying electromagnetics.,Dr. Mai is a Life Member of OPTICA and ACES.

